<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Sigara Takip Pro</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
    <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
    <script src="https://npmcdn.com/flatpickr/dist/l10n/tr.js"></script>
    <style>
        :root { --bg: #0b1120; --card: #1e293b; --accent: #38bdf8; --danger: #ef4444; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: #f1f5f9; padding: 20px; max-width: 500px; margin: auto; }
        .card { background: var(--card); padding: 20px; border-radius: 20px; margin-bottom: 15px; border: 1px solid #334155; }
        
        /* ÇUBUK GRAFİK TAŞMA DÜZELTMESİ */
        .bar-container { display: flex; align-items: flex-end; height: 100px; gap: 5px; margin-top: 15px; border-bottom: 1px solid #334155; }
        .bar { flex: 1; background: var(--accent); border-radius: 4px 4px 0 0; min-height: 2px; max-height: 90px; display: flex; align-items: flex-end; justify-content: center; font-size: 10px; font-weight: bold; overflow: hidden; }
        
        .progress-container { background: #334155; height: 12px; border-radius: 6px; overflow: hidden; margin-top: 10px; }
        #progressBar { height: 100%; width: 0%; background: #4ade80; transition: 0.5s; }
        input { background: #0f172a !important; color: white !important; border: 1px solid #334155 !important; width: 100%; padding: 12px; border-radius: 10px; box-sizing: border-box; margin-bottom: 10px; }
        button { cursor: pointer; border: none; border-radius: 10px; padding: 12px; font-weight: bold; width: 100%; color: #0b1120; margin-top: 5px; }
    </style>
</head>
<body>

    <div class="card" style="text-align: center;">
        <div>Bütçe Durumu (Aylık Limit: 2000 TL)</div>
        <div class="progress-container"><div id="progressBar"></div></div>
        <div id="budgetStatus" style="font-size: 14px; margin-top: 8px;">0 TL / 2000 TL</div>
    </div>

    <button style="background: var(--danger); color: white; padding: 18px; font-size: 18px;" onclick="sigaraIctim()">🚬 ŞİMDİ İÇTİM</button>
    <button style="background: #475569; color: white; margin-top: 10px;" onclick="sonKaydiSil()">🗑 Son Kaydı Sil</button>

    <div class="card">
        <h4>📊 Son 7 Günlük Analiz</h4>
        <div class="bar-container" id="barChart"></div>
    </div>

    <div class="card">
        <h4>🛠 Fiyat Güncelle</h4>
        <input type="text" id="targetDate" placeholder="Tarih seçin (gg.aa.yyyy)">
        <input type="number" id="targetPrice" placeholder="Yeni Fiyat">
        <button style="background: var(--accent);" onclick="tarihBazliGuncelle()">Tarihi Güncelle</button>
    </div>

<script>
    const supabaseClient = window.supabase.createClient('https://lkldhxxqwxdytvnegkdh.supabase.co', 'sb_publishable_TWsl4dxKFRDnFNsxs0fu2g_DUc1nqMb');
    
    flatpickr("#targetDate", { dateFormat: "d.m.Y", locale: "tr" });

    async function guncelle() {
        const { data: sigaralar } = await supabaseClient.from('sigara_takip').select('*');
        if (!sigaralar) return;
        
        // Bütçe
        const toplamHarcama = sigaralar.reduce((t, s) => t + (Number(s.fiyat || 0) / 20), 0);
        document.getElementById('budgetStatus').innerText = `${toplamHarcama.toFixed(2)} TL / 2000 TL`;
        document.getElementById('progressBar').style.width = Math.min((toplamHarcama / 2000) * 100, 100) + "%";

        // Grafik
        const barChart = document.getElementById('barChart');
        barChart.innerHTML = "";
        for(let i = 6; i >= 0; i--) {
            let d = new Date(); d.setDate(d.getDate() - i);
            let gunStr = d.toLocaleDateString('tr-TR');
            const adet = sigaralar.filter(s => new Date(s.tarih).toLocaleDateString('tr-TR') === gunStr).length;
            
            // Yüksekliği 90px ile sınırladık (Taşma yapmaz)
            let h = adet > 0 ? Math.max(adet * 5, 10) : 0; 
            barChart.innerHTML += `<div class="bar" style="height:${h}px">${adet > 0 ? adet : ''}</div>`;
        }
    }
    
    async function sigaraIctim() {
        const { data: fiyatlar } = await supabaseClient.from('fiyat_gecmisi').select('fiyat').order('tarih', { ascending: false }).limit(1);
        await supabaseClient.from('sigara_takip').insert([{ fiyat: (fiyatlar[0]?.fiyat || 0), tarih: new Date().toISOString() }]);
        guncelle();
    }

    async function sonKaydiSil() {
        const { data } = await supabaseClient.from('sigara_takip').select('id').order('id', { ascending: false }).limit(1);
        if (data?.length > 0) { await supabaseClient.from('sigara_takip').delete().eq('id', data[0].id); guncelle(); }
    }

    async function tarihBazliGuncelle() {
        const tarih = document.getElementById('targetDate').value;
        const yeniFiyat = document.getElementById('targetPrice').value;
        if(!tarih || !yeniFiyat) return;
        const [d, m, y] = tarih.split('.');
        const { error } = await supabaseClient.from('sigara_takip').update({ fiyat: yeniFiyat }).ilike('tarih::text', `%${y}-${m}-${d}%`);
        if (error) alert("Hata: " + error.message); else { alert("Güncellendi!"); guncelle(); }
    }

    guncelle();
</script>
</body>
</html>
