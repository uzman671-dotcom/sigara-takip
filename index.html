<!DOCTYPE html>
<html lang="tr">
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta charset="UTF-8">
    <title>Sigara Takip</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
    <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
    <script src="https://npmcdn.com/flatpickr/dist/l10n/tr.js"></script>
    <style>
        body { margin: 0; padding: 0; background: #0b1120; color: white; font-family: sans-serif; }
        /* Kısıtlama yok, her yer %100 */
        .container { width: 100%; padding: 20px; box-sizing: border-box; }
        .card { background: #1e293b; padding: 20px; border-radius: 15px; margin-bottom: 15px; width: 100%; box-sizing: border-box; }
        .bar-container { display: flex; align-items: flex-end; height: 150px; gap: 2px; }
        .bar { flex: 1; background: #38bdf8; min-height: 5px; }
        button { width: 100%; padding: 20px; border-radius: 10px; border: none; font-size: 18px; margin-bottom: 10px; cursor: pointer; }
        input { width: 100%; padding: 15px; border-radius: 10px; border: 1px solid #334155; background: #0f172a; color: white; font-size: 16px; margin-bottom: 10px; box-sizing: border-box; }
    </style>
</head>
<body>

<div class="container">
    <div class="card">
        <div id="budgetStatus">Yükleniyor...</div>
    </div>

    <button style="background:#ef4444; color:white;" onclick="sigaraIctim()">SİGARA İÇTİM</button>

    <div class="card">
        <h4>Grafik</h4>
        <div class="bar-container" id="barChart"></div>
    </div>

    <div class="card">
        <input type="text" id="targetDate" placeholder="Tarih seç">
        <input type="number" id="targetPrice" placeholder="Fiyat">
        <button style="background:#38bdf8;" onclick="tarihBazliGuncelle()">GÜNCELLE</button>
    </div>
</div>

<script>
    const supabaseClient = window.supabase.createClient('https://lkldhxxqwxdytvnegkdh.supabase.co', 'sb_publishable_TWsl4dxKFRDnFNsxs0fu2g_DUc1nqMb');
    flatpickr("#targetDate", { dateFormat: "d.m.Y", locale: "tr" });

    async function guncelle() {
        const { data: sigaralar } = await supabaseClient.from('sigara_takip').select('*');
        if (!sigaralar) return;
        const barChart = document.getElementById('barChart');
        barChart.innerHTML = "";
        for(let i = 6; i >= 0; i--) {
            let d = new Date(); d.setDate(d.getDate() - i);
            let gunStr = d.toISOString().split('T')[0];
            const adet = sigaralar.filter(s => s.tarih && s.tarih.startsWith(gunStr)).length;
            let h = Math.min(adet * 20, 140);
            barChart.innerHTML += `<div class="bar" style="height:${h}px"></div>`;
        }
    }
    
    async function sigaraIctim() {
        const { data: fiyatlar } = await supabaseClient.from('fiyat_gecmisi').select('fiyat').order('tarih', { ascending: false }).limit(1);
        await supabaseClient.from('sigara_takip').insert([{ fiyat: (fiyatlar[0]?.fiyat || 0), tarih: new Date().toISOString() }]);
        guncelle();
    }
    async function tarihBazliGuncelle() {
        const tarih = document.getElementById('targetDate').value;
        const [d, m, y] = tarih.split('.');
        await supabaseClient.from('sigara_takip').update({ fiyat: document.getElementById('targetPrice').value }).ilike('tarih::text', `%${y}-${m}-${d}%`);
        guncelle();
    }
    guncelle();
</script>
</body>
</html>
