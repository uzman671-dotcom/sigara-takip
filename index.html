<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sigara Takip</title>
    <style>
        /* Kısıtlamaları tamamen kaldırdık, her şeyi %100 yaptık */
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #0b1120; color: white; font-family: sans-serif; }
        .container { width: 100vw; height: 100vh; padding: 20px; box-sizing: border-box; }
        .card { background: #1e293b; padding: 20px; border-radius: 15px; margin-bottom: 20px; width: 100%; box-sizing: border-box; }
        button { width: 100%; padding: 30px; font-size: 24px; border-radius: 15px; border: none; background: #ef4444; color: white; cursor: pointer; }
    </style>
</head>
<body>
    <div class="container">
        <div class="card">
            <h1>Sigara Takip Pro</h1>
            <p>Eğer bu yazıyı görüyorsan, sayfa şu an tam ekran genişliğinde çalışıyor demektir.</p>
        </div>
        <button onclick="alert('Çalışıyor!')">SİGARA İÇTİM</button>
    </div>
</body>
</html>
