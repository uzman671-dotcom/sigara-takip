<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sigara Takip Pro</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
    <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
    <script src="https://npmcdn.com/flatpickr/dist/l10n/tr.js"></script>
    <style>
        body { margin: 0; padding: 20px; background: #0b1120; color: #f1f5f9; font-family: sans-serif; display: flex; justify-content: center; }
        .wrapper { width: 100%; max-width: 600px; }
        .card { background: #1e293b; padding: 20px; border-radius: 15px; margin-bottom: 15px; border: 1px solid #334155; }
        .bar-container { display: flex; align-items: flex-end; height: 100px; gap: 5px; margin-top: 15px; border-bottom: 1px solid #334155; }
        .bar { flex: 1; background: #38bdf8; min-height: 5px; max-height: 90px; border-radius: 4px 4px 0 0; display: flex; align-items: flex-end; justify-content: center; font-size: 10px; font-weight: bold; }
        button { width: 100%; padding: 15px; border-radius: 10px; border: none; font-weight: bold; cursor: pointer; margin-top: 5px; font-size: 16px; }
        input { width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #334155; background: #0f172a; color: white; margin-bottom: 10px; box-sizing: border-box; }
    </style>
</head>
<body>

<div class="wrapper">
    <div class="card" style="text-align: center;">
        <div id="status">Yükleniyor...</div>
        <div style="background:#334155; height:10px; border-radius:5px; margin-top:10px;"><div id="prog" style="height:100%; width:0%; background:#4ade80;"></div></div>
    </div>
    <button style="background:#ef4444; color:white;" onclick="ekle()">🚬 SİGARA İÇTİM</button>
    <button style="background:#475569; color:white; margin-top:10px;" onclick="sil()">🗑 Son Kaydı Sil</button>
    
    <div class="card">
        <h4>📊 Son 7 Gün</h4>
        <div class="bar-container" id="barChart"></div>
    </div>
    
    <div class="card">
        <input type="text" id="date" placeholder="Tarih seçin...">
        <input type="number" id="price" placeholder="Yeni Fiyat">
        <button style="background:#38bdf8;" onclick="guncelleFiyat()">Fiyat Güncelle</button>
    </div>
</div>

<script>
    // Tek bir Supabase örneği
    const sb = window.supabase.createClient('https://lkldhxxqwxdytvnegkdh.supabase.co', 'sb_publishable_TWsl4dxKFRDnFNsxs0fu2g_DUc1nqMb');
    flatpickr("#date", { dateFormat: "d.m.Y", locale: "tr" });

    async function fetchData() {
        const { data: s } = await sb.from('sigara_takip').select('*');
        if (!s) return;

        // Bütçe
        const b = s.reduce((t, x) => t + (Number(x.fiyat || 0) / 20), 0);
        document.getElementById('status').innerText = `${b.toFixed(2)} TL / 2000 TL`;
        document.getElementById('prog').style.width = Math.min((b / 2000) * 100, 100) + "%";

        // Grafik (Sadece tarihi olanları alarak hatayı çözüyoruz)
        const chart = document.getElementById('barChart');
        chart.innerHTML = "";
        let counts = [];
        for(let i = 6; i >= 0; i--) {
            let d = new Date(); d.setDate(d.getDate() - i);
            let sStr = d.toISOString().split('T')[0];
            const n = s.filter(x => x.tarih && x.tarih.startsWith(sStr)).length;
            counts.push(n);
        }
        let max = Math.max(...counts, 1);
        counts.forEach(n => {
            chart.innerHTML += `<div class="bar" style="height:${(n/max)*90}px">${n > 0 ? n : ''}</div>`;
        });
    }

    async function ekle() {
        await sb.from('sigara_takip').insert([{ fiyat: 30, tarih: new Date().toISOString() }]);
        fetchData();
    }
    
    async function sil() {
        const { data } = await sb.from('sigara_takip').select('id').order('id', { ascending: false }).limit(1);
        if (data?.length > 0) { await sb.from('sigara_takip').delete().eq('id', data[0].id); fetchData(); }
    }

    async function guncelleFiyat() {
        const dStr = document.getElementById('date').value.split('.');
        if(!dStr[0]) return;
        await sb.from('sigara_takip').update({ fiyat: document.getElementById('price').value }).ilike('tarih::text', `%${dStr[2]}-${dStr[1]}-${dStr[0]}%`);
        fetchData();
    }

    fetchData();
</script>
</body>
</html>
